name: CI Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test imports
        run: |
          python -c "import streamlit, plotly, pandas, scipy, statsmodels"
          echo "All imports OK"

      - name: Lint
        run: |
          pip install flake8
          flake8 backend/ frontend/ --max-line-length=120 --ignore=E501,W503 || true